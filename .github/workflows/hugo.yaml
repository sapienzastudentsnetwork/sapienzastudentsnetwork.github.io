# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - main

  # Schedule this workflow to run every 37 minutes
  schedule:
    - cron: "*/37 * * * *"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.161.1
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb          
      - name: Install Dart Sass
        run: |
          # Fetch the latest release tag from GitHub API
          LATEST_SASS_VERSION=$(curl --silent "https://api.github.com/repos/sass/dart-sass/releases/latest" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          # Download the latest Dart Sass version
          wget https://github.com/sass/dart-sass/releases/download/${LATEST_SASS_VERSION}/dart-sass-${LATEST_SASS_VERSION}-linux-x64.tar.gz \
          -O ${{ runner.temp }}/dart-sass.tar.gz
          # Extract Dart Sass
          tar -xzf ${{ runner.temp }}/dart-sass.tar.gz -C ${{ runner.temp }}
          # Move Dart Sass to a directory in the PATH
          sudo mv ${{ runner.temp }}/dart-sass /usr/local/bin/dart-sass
          # Create a symbolic link to make sass command available globally
          sudo ln -s /usr/local/bin/dart-sass/sass /usr/local/bin/sass
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
      - name: Build TailwindCSS output
        run: npm run build
      - name: Build with Hugo
        env:
          # For maximum backward compatibility with Hugo modules
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
          TZ: Europe/Rome
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/" \
            --theme hugo-book

      - name: Generate HTML Redirects for Aliases
        shell: python
        env:
          # Passing the GitHub Pages base URL to safely construct absolute redirect links
          BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: |
          import os
          from pathlib import Path

          base_url = os.environ.get('BASE_URL', '').rstrip('/')

          # Define the target-to-aliases mapping dictionary
          mappings = {
              "acsai": ["30786", "33502"],
              "compsci": ["29932", "33508", "computerscience"],
              "cybersec": ["29389", "33516", "cybersecurity"],
              "datasci": ["32344", "33519", "datascience"],
              "it": ["29923", "29400", "33503", "33504", "inf", "informatica"]
          }

          for target, aliases in mappings.items():
              target_dir = Path(f'public/{target}')
          
              # Skip if the Hugo target folder doesn't exist to prevent errors
              if not target_dir.exists():
                  continue

              for html_file in target_dir.glob('**/*.html'):
                  rel_path = html_file.relative_to(target_dir)

                  for alias in aliases:
                      dest_file = Path(f'public/{alias}') / rel_path
                      dest_file.parent.mkdir(parents=True, exist_ok=True)

                      # Construct the correct path suffix
                      if rel_path.name == 'index.html':
                          if str(rel_path.parent) != '.':
                              path_suffix = f"{target}/{rel_path.parent}/"
                          else:
                              path_suffix = f"{target}/"
                      else:
                          path_suffix = f"{target}/{rel_path}"

                      # Normalize paths for web and combine with absolute base URL
                      path_suffix = path_suffix.replace('\\', '/')
                      url_path = f"{base_url}/{path_suffix}"

                      # Write Hugo native HTML redirect template with dynamic lang attribute
                      hugo_alias_template = f'''<!DOCTYPE html>
          <html lang="{target}">
            <head>
              <title>{url_path}</title>
              <link rel="canonical" href="{url_path}">
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url={url_path}">
            </head>
          </html>'''
          
                      dest_file.write_text(hugo_alias_template, encoding='utf-8')

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
